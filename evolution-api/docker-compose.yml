version: '3.8'

services:
  # 1. El motor de WhatsApp (Evolutio API v2)
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=API1597538624

      # Conexión a la base de datos compañera
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:evolutionsql@postgres:5432/evolution_db

      # Conexión a la memoria rápida compañera
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution

      - WEBSOCKET_ENABLED=false
    depends_on:
      - postgres
      - redis
    volumes:
      - ./evolution_instances:/evolution/instances

  # 2. Base de datos (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=evolutionsql
      - POSTGRES_DB=evolution_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 3. Caché de alta velocidad (Redis)
  redis:
    image: redis:alpine
    container_name: evolution_redis
    restart: always
    volumes:
      - ./redis_data:/data
